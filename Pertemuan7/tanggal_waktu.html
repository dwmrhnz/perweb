<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanggal dan Waktu</title>
</head>
<body>
    <script language = "javascript">
        var waktu = new Date();
        document.write("Tanggal sekarang: " + waktu.getDate() + "<br />");
        document.write("Bulan sekarang: " + waktu.getMonth() + "<br />");
        document.write("Tahun sekarang: " + waktu.getFullYear() + "<br />");
        document.write("Jam sekarang: " + waktu.getHours() + "<br />");
        document.write("Menit sekarang: " + waktu.getMinutes() + "<br />");
        document.write("Detik sekarang: " + waktu.getSeconds() + "<br />");
    </script>
</body>
</html>
