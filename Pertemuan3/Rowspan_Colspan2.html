<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowspan_Colspan</title>
</head>
<body>
    <table border="1">
    <tr>
        <td rowspan="2">Sektor</td>
        <td colspan="2">Tahun</td>
    </tr>
    <tr>
        <td>1995</td>
        <td>1996</td>
    </tr>
    <tr>
        <td>Agribisnis</td>
        <td>40%</td>
        <td>35%</td>
    </tr>
    </table>
</body>
</html>
