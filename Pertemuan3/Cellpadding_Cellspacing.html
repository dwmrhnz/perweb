<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellpadding_Cellspacing</title>
</head>
<body>
    <h4>Tanpa Cellpadding dan Cellspacing</h4>
    <table>
        <tr>
            <th>NIM</th>
            <th>UTS</th>
            <th>UAS</th>
        </tr>
        <tr>
            <td>j3101079</td>
            <td>75</td>
            <td>86</td>
        </tr>
    </table>
    <h4>Tanpa Cellpadding dan Cellspacing</h4>
    <table border="1">
        <tr>
            <th>NIM</th>
            <th>UTS</th>
            <th>UAS</th>
        </tr>
        <tr>
            <td>j3101079</td>
            <td>75</td>
            <td>86</td>
        </tr>
    </table>
    <h4>Dengan Cellpadding : 8</h4>
    <table border="1" cellpadding="8">
        <tr>
            <th>NIM</th>
            <th>UTS</th>
            <th>UAS</th>
        </tr>
        <tr>
            <td>j3101079</td>
            <td>75</td>
            <td>86</td>
        </tr>
    </table>
    <h4>Dengan Cellpadding : 8 Cellspacing : 15</h4>
    <tabl border="1" cellpadding="8" cellspacing="15">
        <tr>
            <th>NIM</th>
            <th>UTS</th>
            <th>UAS</th>
        </tr>
        <tr>
            <td>j3101079</td>
            <td>75</td>
            <td>86</td>
        </tr>
    </tabl>
</body>
</html>
