<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowspan_Colspan</title>
</head>
<body>
    <h4>Colspan pada baris kedua</h4>
    <table border="1">
        <tr>
            <td>Data satu</td>
            <td>Data dua</td>
        </tr>
        <tr>
            <td colspan="2">Ini dua sl yang digabung (colspan)</td>
        </tr>
    </table>
    <h4>Rowspan pada kolom kedua</h4>
    <table border="1">
        <tr>
            <td>Data tiga</td>
            <td rowspan="2">Ini dua seel yang digabung(rowspan)</td>
        </tr>
        <tr>
            <td>Data empat</td>
        </tr>
    </table>
</body>
</html>
