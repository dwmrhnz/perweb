<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Format Isi Sel</title>
</head>
<body>
    <h4>Td tanpa width</h4>
    <table border="1">
        <tr>
            <td>Manajemen</td>
            <td>Informatika</td>
        </tr>
    </table>
    <h4>Td dengan width dan format isi sel</h4>
    <table border="1">
        <tr>
            <td width="170">Manajemen</td>
            <td width="170" align="right">Informatika</td>
        </tr>
    </table>
    <h4>Td dengan height dan format isi sel</h4>
    <table border="1">
        <tr>
            <td height="70" Valign="top">Manajemen</td>
            <td height="70" Valign="bottom">Informatika</td>
        </tr>
    </table>
</body>
</html>
