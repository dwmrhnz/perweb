<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keliling Lingkaran</title>
</head>
<body>
    <script language="javascript">
        var r = 10;
        var n = 3;
        
        var kelLingk = 2 * Math.PI * r;
        var nLingk = n * kelLingk;
        document.write("3 x keliling lingkaran = " + nLingk + "<br>")
    </script>
</body>
</html>
