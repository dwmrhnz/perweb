<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengulangan For</title>
</head>
<body>
    <script lang="javascript">
        for(i=1;i<=5;i=i+1) {
            document.write("Bilangan " + i + "<br>")
        }
    </script>
</body>
</html>
