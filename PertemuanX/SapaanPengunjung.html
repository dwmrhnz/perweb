<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapaan Pengunjung</title>
</head>
<body>
    <script language = "javascript">
        /* Script ini menanyakan kepada pengunjung
        namanya kemudian menampilkan sapaan kepada pengunjung tersebut */
        var pengunjung = prompt("Tulis nama anda di bawah", "Yup, di sini");
        window.alert("Hai " + pengunjung + " Gimana kabarnya?");
        document.write("Hai " + pengunjung + " Gimana kabarnya?");
    </script>
</body>
</html>
