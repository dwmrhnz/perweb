<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengulangan While</title>
</head>
<body>
    <script lang="javascript">
        iterasi = 5;
        i = 1;
        while(i <= iterasi) {
            document.write("Ini angka " + i + "<br>");
            i = i+ 1;
        }
    </script>
</body>
</html>
