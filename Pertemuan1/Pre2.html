<html>
	<head>
		<title> Paragraf </title>
	</head>
	<body>
		<pre>
			Do While epoh <txtMaxEpoh And Alpha> CSng(txtEps)
					epoh = epoh + 1
					For i = 1 To jumlahTanaman
						For j = 1 To MAX_JENIS
							If Trim(data(i, j, 1)) = "" Then Exit For
							For k = 1 To jmlahTanaman
								bobot(k) = 0
							Next katakana
		</pre>
	</body>
</html>
